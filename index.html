<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Invaders</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #000;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            color: #00ff00;
        }
        
        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            border: 2px solid #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }
        
        #gameCanvas {
            background: #000;
            display: block;
        }
        
        #gameTitle {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 36px;
            text-shadow: 0 0 10px #00ff00;
            letter-spacing: 3px;
        }
        
        #scoreBoard {
            position: absolute;
            top: 70px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 20px;
        }
        
        #gameOver {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        
        #gameOver h2 {
            font-size: 48px;
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000;
            margin-bottom: 20px;
        }
        
        #restartButton {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            margin-top: 20px;
            border-radius: 5px;
            font-weight: bold;
        }
        
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        
        #startButton {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            margin-top: 20px;
            border-radius: 5px;
            font-weight: bold;
        }
        
        #instructions {
            text-align: center;
            margin-top: 30px;
            line-height: 1.6;
            max-width: 80%;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="gameTitle">SPACE INVADERS</div>
        <div id="scoreBoard">SCORE: <span id="score">0</span> | LIVES: <span id="lives">3</span></div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="gameOver">
            <h2>GAME OVER</h2>
            <p id="finalScore">Your Score: 0</p>
            <button id="restartButton">PLAY AGAIN</button>
        </div>
        <div id="startScreen">
            <h1>SPACE INVADERS</h1>
            <div id="instructions">
                <p>CONTROLS:</p>
                <p>← → : MOVE LEFT/RIGHT</p>
                <p>SPACE : FIRE LASER</p>
                <p>DESTROY ALL ALIENS TO WIN!</p>
            </div>
            <button id="startButton">START GAME</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
